<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <style>
    :root {
      --bg1: #f4f7ff;
      --bg2: #eefaf3;
      --text: #1f2937;
      --card: #ffffff;
      --border: #e5e7eb;
      --btn: #2563eb;
      --btn-hover: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px;
      color: #4b5563;
    }

    .numbers {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 52px;
      margin-bottom: 20px;
    }

    .ball {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #fff;
      font-size: 18px;
    }

    .n1 { background: #f59e0b; }
    .n2 { background: #3b82f6; }
    .n3 { background: #ef4444; }
    .n4 { background: #6b7280; }
    .n5 { background: #22c55e; }

    button {
      border: 0;
      background: var(--btn);
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--btn-hover);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>로또 번호 생성기</h1>
    <p>1~45 중 중복 없이 6개 번호를 생성합니다.</p>
    <section id="numbers" class="numbers" aria-live="polite"></section>
    <button id="generateBtn" type="button">번호 생성</button>
  </main>

  <script>
    const numbersEl = document.getElementById("numbers");
    const generateBtn = document.getElementById("generateBtn");

    function pickLottoNumbers() {
      const picked = new Set();

      while (picked.size < 6) {
        picked.add(Math.floor(Math.random() * 45) + 1);
      }

      return [...picked].sort((a, b) => a - b);
    }

    function colorClassByNumber(num) {
      if (num <= 10) return "n1";
      if (num <= 20) return "n2";
      if (num <= 30) return "n3";
      if (num <= 40) return "n4";
      return "n5";
    }

    function renderNumbers() {
      const nums = pickLottoNumbers();
      numbersEl.innerHTML = nums
        .map((num) => `<span class="ball ${colorClassByNumber(num)}">${num}</span>`)
        .join("");
    }

    generateBtn.addEventListener("click", renderNumbers);
    renderNumbers();
  </script>
</body>
</html>
